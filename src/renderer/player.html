<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.ytimg.com https://*.youtube.com; media-src 'self' blob: https://*.googlevideo.com https://*.youtube.com; frame-src https://www.youtube-nocookie.com; connect-src 'self' https://*.googlevideo.com https://*.youtube.com https://sponsor.ajay.app;">
    <title>Private Theater Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        header {
            background: rgba(20, 20, 20, 0.8);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
        }
        body:hover header {
            opacity: 1;
        }
        .search-container {
            display: flex;
            flex-grow: 1;
            max-width: 600px;
            margin: 0 20px;
        }
        #search-input {
            flex-grow: 1;
            padding: 8px 15px;
            border-radius: 20px 0 0 20px;
            border: 1px solid #333;
            background: #121212;
            color: white;
            outline: none;
        }
        #search-btn {
            padding: 8px 20px;
            border-radius: 0 20px 20px 0;
            border: 1px solid #333;
            background: #333;
            color: white;
            cursor: pointer;
        }
        main {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        #video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #video-details-overlay {
            position: absolute;
            bottom: 60px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 90;
        }
        body:hover #video-details-overlay {
            opacity: 1;
        }
        h1 { font-size: 1.2em; margin: 0 0 5px 0; }
        .uploader { color: #ccc; font-size: 0.9em; }
        button.action-btn { padding: 8px 15px; background: #f00; color: white; border: none; border-radius: 18px; cursor: pointer; font-size: 14px; font-weight: bold; }
        #loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 150; }
        
        /* Custom styles for video captions */
        video::cue {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <header>
        <button id="back-btn" class="action-btn">YouTube</button>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search YouTube...">
            <button id="search-btn">🔍</button>
        </div>
        <div style="width: 80px;"></div>
    </header>

    <main>
        <div id="video-container">
            <div id="loading-overlay">Loading...</div>
            <video id="player" controls autoplay style="display:none;"></video>
            <iframe id="fallback-player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="display:none; width: 100%; height: 100%;"></iframe>
            
            <div id="video-details-overlay">
                <h1 id="video-title"></h1>
                <div class="uploader" id="video-uploader"></div>
            </div>
        </div>
    </main>

    <script src="../../node_modules/hls.js/dist/hls.min.js"></script>
    <script src="player.js"></script>
</body>
</html>
